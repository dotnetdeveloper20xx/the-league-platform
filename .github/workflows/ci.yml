name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore TheLeague.slnx
      - run: dotnet build TheLeague.slnx --no-restore -c Release
      - run: dotnet test TheLeague.slnx --no-build -c Release --filter "Category!=Integration"

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/the-league-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/the-league-client/package-lock.json
      - run: npm ci
      - run: npm run build -- --configuration production

  docker-build:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t theleague-api -f src/TheLeague.Host/Dockerfile .
      - run: docker build -t theleague-client src/the-league-client
